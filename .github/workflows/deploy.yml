name: CI/CD - Fraud Detection

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test model loads correctly
        run: |
          python -c "
          import pickle, numpy as np
          model = pickle.load(open('model.pkl', 'rb'))
          pred = model.predict(np.zeros((1, 30)))
          proba = model.predict_proba(np.zeros((1, 30)))[0][1]
          print('Model loaded successfully!')
          print('Test prediction:', pred)
          print('Test probability:', proba)
          "

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deployment triggered on Render!"